<svg viewBox="0 0 1440 960" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<rect x="0" y="0" width="1440" height="960" fill="#ffffff"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#cf4436"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c7d52"/></marker><marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7a4fa3"/></marker></defs>
<text x="720.0" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#20242e">Inside a data node: gapped array + model-based insertion + exponential search</text>
<text x="720.0" y="64" text-anchor="middle" font-size="13.5" font-weight="400" fill="#6b7280">The three co-designed leaf mechanisms — together they keep prediction error tiny, so bound-free search stays fast.</text>
<text x="40" y="104" text-anchor="start" font-size="15" font-weight="700" fill="#2f6f8f">① Gapped Array layout</text>
<text x="40" y="124" text-anchor="start" font-size="11" font-weight="400" fill="#20242e">Empty slots scattered BETWEEN elements (a B+-tree puts free space only at the end). A bitmap marks key vs gap; gaps read as the nearest key to the right.</text>
<rect x="120" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="135.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">2</text>
<rect x="150" y="160" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="180" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="195.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">5</text>
<rect x="210" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="225.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">7</text>
<rect x="240" y="160" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="270" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="285.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">11</text>
<rect x="300" y="160" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="330" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="345.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">14</text>
<rect x="360" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="375.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">16</text>
<rect x="390" y="160" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="420" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="435.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">19</text>
<rect x="450" y="160" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="465.0" y="178.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">22</text>
<text x="135.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="165.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#8b919d">0</text>
<text x="195.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="225.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="255.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#8b919d">0</text>
<text x="285.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="315.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#8b919d">0</text>
<text x="345.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="375.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="405.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#8b919d">0</text>
<text x="435.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="465.0" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">1</text>
<text x="112" y="205" text-anchor="end" font-size="9.5" font-weight="400" fill="#8b919d">bitmap</text>
<text x="40" y="250" text-anchor="start" font-size="10.5" font-weight="400" fill="#6b7280">Density kept in a band  dₗ=0.6 … dᵤ=0.8  (avg ~0.7).  'Full' = next insert would exceed dᵤ.</text>
<text x="40" y="300" text-anchor="start" font-size="15" font-weight="700" fill="#2c7d52">② Model-based insertion</text>
<text x="40" y="320" text-anchor="start" font-size="11" font-weight="400" fill="#20242e">Place the new key WHERE THE MODEL PREDICTS (data conforms to the model). Two cases:</text>
<text x="120" y="352" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">case A — predicted slot is a gap → drop in (O(1)):</text>
<rect x="120" y="366" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="135.0" y="384.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">2</text>
<rect x="150" y="366" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="180" y="366" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="195.0" y="384.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">5</text>
<rect x="210" y="366" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="225.0" y="384.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">7</text>
<rect x="240" y="366" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="270" y="366" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="285.0" y="384.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">11</text>
<path d="M255.0,340 L255.0,363" stroke="#2c7d52" stroke-width="2" fill="none" marker-end="url(#a)"/>
<text x="255.0" y="335" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2c7d52">predicts</text>
<text x="318" y="388" text-anchor="start" font-size="10" font-weight="700" fill="#2c7d52">key 9 → gap → done</text>
<text x="120" y="452" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">case B — predicted slot occupied → shift toward nearest gap, then insert:</text>
<rect x="120" y="466" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="135.0" y="484.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">2</text>
<rect x="150" y="466" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="165.0" y="484.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">5</text>
<rect x="180" y="466" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="195.0" y="484.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">7</text>
<rect x="210" y="466" width="30" height="30" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="240" y="466" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="255.0" y="484.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">11</text>
<rect x="270" y="466" width="30" height="30" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="285.0" y="484.6" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">14</text>
<path d="M165.0,440 L165.0,463" stroke="#2c7d52" stroke-width="2" fill="none" marker-end="url(#a)"/>
<text x="165.0" y="435" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2c7d52">predicts</text>
<path d="M165,500 L225,500" stroke="#cf4436" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>
<text x="234" y="504" text-anchor="start" font-size="10" font-weight="400" fill="#cf4436">shift right to the gap</text>
<text x="40" y="540" text-anchor="start" font-size="10.5" font-weight="400" fill="#6b7280" font-style="italic">Self-consistent placement → error d stays small → exponential search (next) is cheap. Double edge: gaps fill / drift grows → error climbs (the degradation seam).</text>
<text x="40" y="600" text-anchor="start" font-size="15" font-weight="700" fill="#b06a14">③ Exponential search (bound-free last mile)</text>
<text x="40" y="620" text-anchor="start" font-size="11" font-weight="400" fill="#20242e">Start at the prediction, probe outward in DOUBLING jumps until you overshoot, then binary-search that window. Cost = O(log d) in the ACTUAL error d.</text>
