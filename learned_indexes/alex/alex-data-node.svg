<text x="422.5" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">10</text>
<line x1="573.75" y1="726" x2="573.75" y2="734" stroke="#8b919d" stroke-width="1"/>
<text x="573.75" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">15</text>
<line x1="725.0" y1="726" x2="725.0" y2="734" stroke="#8b919d" stroke-width="1"/>
<text x="725.0" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">20</text>
<line x1="876.25" y1="726" x2="876.25" y2="734" stroke="#8b919d" stroke-width="1"/>
<text x="876.25" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">25</text>
<line x1="1027.5" y1="726" x2="1027.5" y2="734" stroke="#8b919d" stroke-width="1"/>
<text x="1027.5" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">30</text>
<line x1="1178.75" y1="726" x2="1178.75" y2="734" stroke="#8b919d" stroke-width="1"/>
<text x="1178.75" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">35</text>
<line x1="1330.0" y1="726" x2="1330.0" y2="734" stroke="#8b919d" stroke-width="1"/>
<text x="1330.0" y="747" text-anchor="middle" font-size="9" font-weight="400" fill="#8b919d">40</text>
<path d="M543.5,724 L543.5,728" stroke="#b06a14" stroke-width="2" fill="none" marker-end="url(#a)"/>
<circle cx="785.5" cy="730" r="5" fill="#2c7d52"/>
<text x="785.5" y="763" text-anchor="middle" font-size="10" font-weight="700" fill="#2c7d52">true pos (22)</text>
<text x="543.5" y="763" text-anchor="middle" font-size="10" font-weight="700" fill="#b06a14">prediction (14)</text>
<path d="M543.5,708 L573.75,708" stroke="#2c7d52" stroke-width="1.6" fill="none" marker-end="url(#ag)"/>
<text x="581.75" y="712" text-anchor="start" font-size="9" font-weight="700" fill="#2c7d52">+1 → 15</text>
<path d="M543.5,688 L604.0,688" stroke="#2c7d52" stroke-width="1.6" fill="none" marker-end="url(#ag)"/>
<text x="612.0" y="692" text-anchor="start" font-size="9" font-weight="700" fill="#2c7d52">+2 → 16</text>
<path d="M543.5,668 L664.5,668" stroke="#2c7d52" stroke-width="1.6" fill="none" marker-end="url(#ag)"/>
<text x="672.5" y="672" text-anchor="start" font-size="9" font-weight="700" fill="#2c7d52">+4 → 18</text>
<path d="M543.5,648 L785.5,648" stroke="#2c7d52" stroke-width="1.6" fill="none" marker-end="url(#ag)"/>
<text x="793.5" y="652" text-anchor="start" font-size="9" font-weight="700" fill="#2c7d52">+8 → 22</text>
<path d="M543.5,628 L1027.5,628" stroke="#cf4436" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
<text x="1035.5" y="632" text-anchor="start" font-size="9" font-weight="700" fill="#cf4436">+16 → 30  overshoot → bracket [18,30]</text>
<text x="40" y="800" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">Then binary-search the bracket [18,30] → found at 22.  A tiny error finishes in a few probes; binary search would scan a fixed window regardless.</text>
<rect x="40" y="824" width="1360" height="116" rx="8" fill="#fff6e8" stroke="#e7d4ad" stroke-width="1.5"/>
<text x="62" y="850" text-anchor="start" font-size="13" font-weight="700" fill="#b06a14">Why exponential, not binary-within-ε?</text>
<text x="62" y="872" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• Binary search always scans a FIXED window → constant cost no matter how good the prediction. Exponential search costs O(log d), so accurate models win.</text>
<text x="62" y="892" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• It also removes stored error bounds (less metadata). Trade-off: NO worst-case ε guarantee — error is emergent, kept small by ② not capped by math.</text>
<text x="62" y="918" text-anchor="start" font-size="10.5" font-weight="700" fill="#7a4fa3">PGM contrast: PGM guarantees |error| ≤ ε and binary-searches a fixed 2ε window. ALEX lets error emerge and adapts the search to it — the bound-vs-cost-model fork.</text>
</svg>