<text x="710.0" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#20242e">ALEX architecture: an adaptive RMI of pointer-routed models over gapped-array leaves</text>
<text x="710.0" y="64" text-anchor="middle" font-size="13.5" font-weight="400" fill="#6b7280">Internal nodes route by COMPUTING an index into a stored pointer array (no key comparisons). The tree grows deep only where the CDF is hard.</text>
