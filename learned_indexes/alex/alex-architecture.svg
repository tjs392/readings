<text x="905" y="116" text-anchor="start" font-size="12" font-weight="700" fill="#cf4436">lookup(k):</text>
<text x="905" y="134" text-anchor="start" font-size="10" font-weight="400" fill="#cf4436">① root model → slot index (exact, no search)</text>
<text x="905" y="152" text-anchor="start" font-size="10" font-weight="400" fill="#cf4436">② follow pointer → Internal B → slot index</text>
<text x="905" y="170" text-anchor="start" font-size="10" font-weight="400" fill="#cf4436">③ → Data B1 → model predicts → exp-search</text>
<rect x="40" y="560" width="600" height="80" rx="8" fill="#f7f8fa" stroke="#c8cdd6" stroke-width="1.5"/>
<text x="60" y="584" text-anchor="start" font-size="12.5" font-weight="700" fill="#3f51b5">Internal nodes</text>
<text x="60" y="606" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• Models are EXACT by construction → no search in internal nodes, just compute the slot.</text>
<text x="60" y="624" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• Cost = one pointer chase per level. Power-of-2 slots; multiple slots may alias one child.</text>
<rect x="660" y="560" width="720" height="80" rx="8" fill="#f7f8fa" stroke="#c8cdd6" stroke-width="1.5"/>
<text x="680" y="584" text-anchor="start" font-size="12.5" font-weight="700" fill="#2f6f8f">Data nodes (leaves)</text>
<text x="680" y="606" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• Linear model + gapped key array + parallel payload array + occupancy bitmap (skip gaps on scan).</text>
<text x="680" y="624" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• Records stored IN-LEAF (clustered). Final position via model + exponential search (no ε bound).</text>
<rect x="40" y="660" width="1340" height="58" rx="8" fill="#e6f2ec" stroke="#2c7d52" stroke-width="1.5"/>
<text x="60" y="683" text-anchor="start" font-size="12.5" font-weight="700" fill="#2c7d52">Variable resolution (the key idea):</text>
<text x="60" y="703" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">Linear stretches (A, C) go straight to a data node; curvy stretches (B) recurse deeper. The goal is data nodes whose keys are roughly LINEAR — not equal-sized nodes.</text>
<rect x="40" y="738" width="1340" height="156" rx="8" fill="#fff6e8" stroke="#e7d4ad" stroke-width="1.5"/>
<text x="62" y="764" text-anchor="start" font-size="13" font-weight="700" fill="#b06a14">How the routing compares</text>
<text x="62" y="788" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• Kraska RMI: fixed 2–3 levels, models fit to data, aims for EQUAL partitions. Internal models route to the next model.</text>
<text x="62" y="808" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• PGM: NO pointers — each level is a contiguous array of segments; routing is pure arithmetic (index = base + i·size) + a 2ε search.</text>
<text x="62" y="828" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• ALEX: hybrid — model COMPUTES an index (like PGM) but into a STORED pointer array (like a B+-tree) → children can be heterogeneous and movable.</text>
<line x1="62" y1="844" x2="1358" y2="844" stroke="#ecdcbb" stroke-width="1.4"/>
<text x="62" y="868" text-anchor="start" font-size="10.5" font-weight="700" fill="#7a4fa3">→ The pointer array is the price of in-place mutability; PGM stays pointer-free precisely because it never mutates in place (it rebuilds via the shelf).</text>
</svg>