<svg viewBox="0 0 1440 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<rect x="0" y="0" width="1440" height="820" fill="#ffffff"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#cf4436"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c7d52"/></marker><marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7a4fa3"/></marker></defs>
<text x="720.0" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#20242e">Three repair moves when a data node fills: expand · split sideways · split down</text>
<text x="720.0" y="64" text-anchor="middle" font-size="13.5" font-weight="400" fill="#6b7280">A ladder of disruption. ALEX picks among them with its cost model (reactive). Each differs in whether the parent is touched and whether depth grows.</text>
<rect x="30" y="90" width="460" height="640" rx="12" fill="#fcfcfd" stroke="#c8cdd6" stroke-width="1.3"/>
<rect x="500" y="90" width="440" height="640" rx="12" fill="#fcfcfd" stroke="#c8cdd6" stroke-width="1.3"/>
<rect x="950" y="90" width="460" height="640" rx="12" fill="#fcfcfd" stroke="#c8cdd6" stroke-width="1.3"/>
<text x="50" y="118" text-anchor="start" font-size="14" font-weight="700" fill="#2c7d52">① Expand  (density fix)</text>
<text x="50" y="138" text-anchor="start" font-size="10" font-weight="400" fill="#20242e">node too full → bigger gapped array, model rescaled.</text>
<text x="50" y="170" text-anchor="start" font-size="10.5" font-weight="400" fill="#8b919d">before (full):</text>
<rect x="60" y="182" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="74.0" y="198.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">3</text>
<rect x="88" y="182" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="102.0" y="198.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">7</text>
<rect x="116" y="182" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="130.0" y="198.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">9</text>
<rect x="144" y="182" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="158.0" y="198.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">12</text>
<path d="M250,205 L300,205" stroke="#2c7d52" stroke-width="2" fill="none" marker-end="url(#ag)"/>
<text x="275" y="196" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2c7d52">expand</text>
<text x="50" y="250" text-anchor="start" font-size="10.5" font-weight="400" fill="#8b919d">after (back to dₗ, fresh gaps):</text>
<rect x="60" y="262" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="74.0" y="278.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">3</text>
<rect x="88" y="262" width="28" height="26" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="116" y="262" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="130.0" y="278.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">7</text>
<rect x="144" y="262" width="28" height="26" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="172" y="262" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="186.0" y="278.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">9</text>
<rect x="200" y="262" width="28" height="26" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="228" y="262" width="28" height="26" rx="3" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.3"/>
<text x="242.0" y="278.12" text-anchor="middle" font-size="11" font-weight="400" fill="#20242e">12</text>
<rect x="256" y="262" width="28" height="26" rx="3" fill="#eef0f3" stroke="#c8cdd6" stroke-width="1"/>
<rect x="50" y="330" width="420" height="80" rx="8" fill="#e6f2ec" stroke="#2c7d52" stroke-width="1.5"/>
<text x="68" y="354" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• same node, same key range</text>
<text x="68" y="374" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• parent NOT touched · depth unchanged</text>
<text x="68" y="394" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• cost O(m) (copy the keys once)</text>
<text x="50" y="450" text-anchor="start" font-size="10" font-weight="400" fill="#6b7280" font-style="italic">Chosen when the single model still FITS (predictions accurate) — only density hurts. The common case (Table 3: vast majority of full-node events).</text>
<text x="520" y="118" text-anchor="start" font-size="13.5" font-weight="700" fill="#3f51b5">② Split sideways  (B+-tree-like)</text>
<text x="520" y="138" text-anchor="start" font-size="10" font-weight="400" fill="#20242e">one node → two SIBLINGS; parent repointed.</text>
<rect x="560" y="170" width="320" height="34" rx="6" fill="#e9ebf7" stroke="#3f51b5" stroke-width="1.5"/>
<text x="720" y="191" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3f51b5">parent internal node</text>
<rect x="575" y="210" width="70" height="20" rx="3" fill="#fff" stroke="#3f51b5" stroke-width="1"/>
<text x="610" y="224" text-anchor="middle" font-size="9" font-weight="400" fill="#3f51b5">p0</text>
<rect x="653" y="210" width="70" height="20" rx="3" fill="#fff" stroke="#3f51b5" stroke-width="1"/>
<text x="688" y="224" text-anchor="middle" font-size="9" font-weight="400" fill="#3f51b5">p1</text>
<rect x="731" y="210" width="70" height="20" rx="3" fill="#fff" stroke="#3f51b5" stroke-width="1"/>
<text x="766" y="224" text-anchor="middle" font-size="9" font-weight="400" fill="#3f51b5">p2</text>
<rect x="809" y="210" width="70" height="20" rx="3" fill="#fff" stroke="#3f51b5" stroke-width="1"/>
<text x="844" y="224" text-anchor="middle" font-size="9" font-weight="400" fill="#3f51b5">p3</text>
<text x="520" y="256" text-anchor="start" font-size="10" font-weight="400" fill="#8b919d">before: slots p1,p2 → one node (redundant):</text>
<rect x="640" y="268" width="160" height="32" rx="5" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.5"/>
<text x="720" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">Data (to split)</text>
<path d="M614,230 L700,266" stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
<path d="M692,230 L730,266" stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
<text x="520" y="330" text-anchor="start" font-size="10" font-weight="400" fill="#8b919d">after: split the redundant pointers between halves</text>
<rect x="560" y="344" width="150" height="32" rx="5" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.5"/>
<text x="635" y="364" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">Left half</text>
<rect x="730" y="344" width="150" height="32" rx="5" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.5"/>
<text x="805" y="364" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">Right half</text>
<path d="M614,230 L635,342" stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
<path d="M692,230 L805,342" stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
<rect x="520" y="400" width="400" height="96" rx="8" fill="#e9ebf7" stroke="#3f51b5" stroke-width="1.5"/>
<text x="538" y="424" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• parent IS touched (repoint; if no redundant</text>
<text x="538" y="442" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">  pointer, double the array → power-of-2)</text>
<text x="538" y="460" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• depth unchanged UNLESS parent is full →</text>
<text x="538" y="478" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">  cascade up to root.  worst case O(m·log_m p)</text>
<text x="520" y="524" text-anchor="start" font-size="10" font-weight="400" fill="#6b7280" font-style="italic">Power-of-2 = 'boundary preserving' → no retrain below the split.</text>
<text x="970" y="118" text-anchor="start" font-size="13.5" font-weight="700" fill="#cf4436">③ Split down  (no B+-tree analog)</text>
<text x="970" y="138" text-anchor="start" font-size="10" font-weight="400" fill="#20242e">data node → internal node + 2 child data nodes.</text>
<text x="970" y="172" text-anchor="start" font-size="10.5" font-weight="400" fill="#8b919d">before:</text>
<rect x="1090" y="184" width="150" height="32" rx="5" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.5"/>
<text x="1165" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">Data node</text>
<path d="M1165,232 L1165,260" stroke="#cf4436" stroke-width="2" fill="none" marker-end="url(#ar)"/>
<text x="1180" y="250" text-anchor="start" font-size="9.5" font-weight="700" fill="#cf4436">split down</text>
<text x="970" y="290" text-anchor="start" font-size="10.5" font-weight="400" fill="#8b919d">after (depth +1, LOCALLY):</text>
<rect x="1090" y="302" width="150" height="30" rx="5" fill="#e9ebf7" stroke="#3f51b5" stroke-width="1.5"/>
<text x="1165" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#3f51b5">new Internal</text>
<rect x="1010" y="360" width="140" height="30" rx="5" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.5"/>
<text x="1080" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">child L</text>
<rect x="1180" y="360" width="140" height="30" rx="5" fill="#e3eef2" stroke="#2f6f8f" stroke-width="1.5"/>
<text x="1250" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#2f6f8f">child R</text>
<path d="M1140,332 L1080,358" stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
<path d="M1190,332 L1250,358" stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
<rect x="970" y="410" width="420" height="96" rx="8" fill="#fdeeec" stroke="#cf4436" stroke-width="1.5"/>
<text x="988" y="434" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• parent NOT touched at all</text>
<text x="988" y="452" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• adds resolution in ONE spot, depth +1 here</text>
<text x="988" y="470" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• children retrained on their keys · cost O(m)</text>
<text x="988" y="488" text-anchor="start" font-size="10.5" font-weight="400" fill="#20242e">• how ALEX gets unbalanced, variable-res trees</text>
<text x="970" y="534" text-anchor="start" font-size="10" font-weight="400" fill="#6b7280" font-style="italic">Chosen when the parent can't cheaply absorb a sibling, or only this region needs depth.</text>
<rect x="30" y="748" width="1380" height="58" rx="8" fill="#efe9f5" stroke="#7a4fa3" stroke-width="1.5"/>
<text x="50" y="772" text-anchor="start" font-size="12.5" font-weight="700" fill="#7a4fa3">For my thesis:</text>
<text x="50" y="792" text-anchor="start" font-size="9.8" font-weight="400" fill="#20242e">Split-down is the closest existing 'add resolution locally, no parent disturbance' move — but it has NO ε bound and cuts in HALF by key space. My version splits at the ε-forced boundary; sub-range monotonicity proves both halves stay ε-valid. ALEX never implemented MERGE (the inverse) — my Hard Part 2.</text>
</svg>