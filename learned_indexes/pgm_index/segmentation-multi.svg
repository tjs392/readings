<text x="58" y="660" font-size="15" font-weight="700" fill="#20242e">Verified against the real implementation — and the optimality gap is visible in the shaded zone</text>
<text x="58" y="690" font-size="13.5" font-weight="700" fill="#2f4b86">ShrinkingCone — 5 segments</text>
<text x="58" y="712" font-size="12.5" fill="#3a3f4b">Every candidate line must pivot through that segment's <tspan font-weight="700" fill="#2f4b86">first point (○)</tspan>. Across keys 72–130 the pinned wedge</text>
<text x="58" y="730" font-size="12.5" fill="#3a3f4b">narrows past empty and is forced to cut <tspan font-weight="700">twice</tspan>, producing 3 segments where PGM needs 1.</text>
<text x="770" y="690" font-size="13.5" font-weight="700" fill="#b06a14">PGM optimal — 4 segments</text>
<text x="770" y="712" font-size="12.5" fill="#3a3f4b">The line may sit <tspan font-weight="700" fill="#b06a14">anywhere in the 2ε band</tspan> (dashed ○ = first point the line skips). One tilted band covers all of</text>
<text x="770" y="730" font-size="12.5" fill="#3a3f4b">keys 72–130, so no cut is needed there. Same ε, one fewer segment overall.</text>
<line x1="58" y1="750" x2="1442" y2="750" stroke="#e2e5ea"/>
<text x="58" y="774" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700">Provenance:</tspan> PGM boundaries [2, 24, 72, 133] and the slopes/intercepts come straight from compiling and running PGM's</text>
<text x="58" y="792" font-size="12.5" fill="#3a3f4b">piecewise_linear_model.hpp on this dataset. The source confirms: tolerance is added vertically (y±ε), it maintains upper/lower convex</text>
<text x="58" y="810" font-size="12.5" fill="#3a3f4b">hulls, and the chosen slope is the midpoint of the feasible range with a <tspan font-weight="700">freely computed intercept</tspan> — i.e. the line is not pinned.</text>
<text x="58" y="834" font-size="12" font-style="italic" fill="#8b919d">Vertical bars at each point show the ±ε tolerance the segment line must thread. ○ solid = pinned origin (cone); ○ dashed = first point the PGM line skips.</text>
<text x="58" y="856" font-size="12" font-style="italic" fill="#8b919d">Note PGM's ε is an integer, so this uses ε = 1 (the earlier ε = 1.5 figure was illustrative; this one is canonical and verified).</text>
</svg>