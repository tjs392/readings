<svg viewBox="0 0 1320 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="1320" height="780" fill="#ffffff"/>
  <text x="660" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#20242e">Why the recursive PGM-index costs only Θ(m) space</text>
  <text x="660" y="65" text-anchor="middle" font-size="14" fill="#6b7280">Each level has ≥ 2ε fewer segments than the one below (Lemma 2). Here m = 64 and 2ε = 4.</text>
  <line x1="640" y1="100" x2="640" y2="700" stroke="#e2e5ea" stroke-width="1.4" stroke-dasharray="3 5"/>

  <!-- ===== LEFT: the pyramid ===== -->
  <text x="320" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#b06a14">The structure (root on top, leaves below)</text>

  <!-- root : 1 -->
  <rect x="312" y="150" width="16" height="40" rx="3" fill="#fbedd4" stroke="#b06a14" stroke-width="1.6"/>
  <text x="345" y="175" font-size="12.5" fill="#3a3f4b">level 3 (root): <tspan font-weight="700">1</tspan> segment</text>
  <!-- level 2 : 4 -->
  <rect x="288" y="232" width="64" height="44" rx="4" fill="#fbedd4" stroke="#b06a14" stroke-width="1.6"/>
  <text x="372" y="258" font-size="12.5" fill="#3a3f4b">level 2: <tspan font-weight="700">4</tspan> = m/(2ε)²</text>
  <!-- level 1 : 16 -->
  <rect x="192" y="318" width="256" height="48" rx="5" fill="#fbedd4" stroke="#b06a14" stroke-width="1.6"/>
  <text x="320" y="347" text-anchor="middle" font-size="12.5" fill="#3a3f4b">level 1: <tspan font-weight="700">16</tspan> = m/(2ε)</text>
  <!-- level 0 : 64 (leaves) -->
  <rect x="60" y="410" width="520" height="56" rx="6" fill="#fbedd4" stroke="#b06a14" stroke-width="2"/>
  <text x="320" y="444" text-anchor="middle" font-size="13" fill="#3a3f4b">level 0 (leaves): <tspan font-weight="700">m = 64</tspan> segments — index the real array</text>

  <!-- connectors -->
  <g stroke="#d9ad6a" stroke-width="1" fill="none" stroke-dasharray="2 3">
    <path d="M320,190 L320,232"/><path d="M320,276 L320,318"/><path d="M320,366 L320,410"/>
  </g>

  <rect x="60" y="492" width="520" height="20" rx="3" fill="#eef0f3" stroke="#c8cdd6"/>
  <text x="320" y="506" text-anchor="middle" font-size="11.5" fill="#6b7280">sorted array A (n keys)</text>
  <path d="M320,466 L320,492" stroke="#9aa0ac" stroke-width="1.1" fill="none"/>

  <text x="320" y="548" text-anchor="middle" font-size="12.5" fill="#3a3f4b">Bar width ∝ number of segments. Each level up is</text>
  <text x="320" y="566" text-anchor="middle" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700" fill="#b06a14">≥ 2ε times narrower</tspan> → the pyramid collapses fast.</text>
  <text x="320" y="592" text-anchor="middle" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700">Levels L = log₍₂ₑ₎ m</tspan> (here log₄ 64 = 3 levels above leaves).</text>

  <!-- ===== RIGHT: the math ===== -->
  <text x="980" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#20242e">The geometric series</text>

  <text x="700" y="172" font-size="14" fill="#3a3f4b">Total segments across all levels:</text>
  <text x="700" y="208" font-size="16" font-family="ui-monospace, monospace" fill="#20242e">m + m/(2ε) + m/(2ε)² + … + 1</text>
  <text x="700" y="246" font-size="16" font-family="ui-monospace, monospace" fill="#20242e">= m · Σ (1/2ε)<tspan font-size="11" dy="-6">ℓ</tspan><tspan dy="6"> </tspan>  ≤  m · 1/(1 − 1/2ε)</text>
  <text x="700" y="284" font-size="16" font-family="ui-monospace, monospace" fill="#b06a14" font-weight="700">= Θ(m)</text>

  <rect x="700" y="312" width="540" height="92" rx="8" fill="#f7f8fa" stroke="#e2e5ea"/>
  <text x="718" y="338" font-size="13" fill="#3a3f4b">With the numbers: <tspan font-family="ui-monospace, monospace">64 + 16 + 4 + 1 = 85</tspan></text>
  <text x="718" y="362" font-size="13" fill="#3a3f4b"><tspan font-family="ui-monospace, monospace">85 ≈ 1.33 × 64</tspan>  — the ratio 1/(2ε) = ¼ ≤ ½, so the sum</text>
  <text x="718" y="386" font-size="13" fill="#3a3f4b">converges to a <tspan font-weight="700">constant × m</tspan>. All routing levels together</text>

  <!-- shrinking bars mini -->
  <text x="700" y="446" font-size="13" font-weight="700" fill="#3a3f4b">Each level's contribution (shrinks ×¼):</text>
  <g>
    <rect x="700" y="460" width="400" height="22" rx="3" fill="#fbedd4" stroke="#b06a14"/><text x="1110" y="476" font-size="12" font-family="ui-monospace, monospace" fill="#3a3f4b">64</text>
    <rect x="700" y="488" width="100" height="22" rx="3" fill="#fbedd4" stroke="#b06a14"/><text x="810" y="504" font-size="12" font-family="ui-monospace, monospace" fill="#3a3f4b">16</text>
    <rect x="700" y="516" width="25" height="22" rx="3" fill="#fbedd4" stroke="#b06a14"/><text x="735" y="532" font-size="12" font-family="ui-monospace, monospace" fill="#3a3f4b">4</text>
    <rect x="700" y="544" width="7" height="22" rx="2" fill="#fbedd4" stroke="#b06a14"/><text x="717" y="560" font-size="12" font-family="ui-monospace, monospace" fill="#3a3f4b">1</text>
  </g>
  <text x="700" y="590" font-size="12.5" font-style="italic" fill="#8b919d">The leaf level dominates; everything above it is a small constant tax.</text>

  <!-- query bound -->
  <rect x="60" y="628" width="1180" height="118" rx="10" fill="#f7f8fa" stroke="#e2e5ea"/>
  <text x="82" y="656" font-size="14" font-weight="700" fill="#20242e">…and the same level count gives the query bound</text>
  <text x="82" y="682" font-size="13" fill="#3a3f4b">A query does <tspan font-weight="700">L binary searches</tspan>, each over a window of size <tspan font-family="ui-monospace, monospace">2ε</tspan> (cost <tspan font-family="ui-monospace, monospace">log 2ε</tspan> each).</text>
  <text x="82" y="706" font-size="13" fill="#3a3f4b">Worst case <tspan font-family="ui-monospace, monospace">c = 2ε</tspan>:  <tspan font-family="ui-monospace, monospace">L · log(2ε) = log₍₂ₑ₎(m) · log(2ε) = log₂ m</tspan>  (change-of-base cancels), plus the final <tspan font-family="ui-monospace, monospace">log ε</tspan>.</text>
  <text x="82" y="730" font-size="13" fill="#b06a14" font-weight="700">→ query time O(log m + log ε):  "descent costs log m, last-mile correction costs log ε."</text>
</svg>
