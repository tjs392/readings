<svg viewBox="0 0 1500 940" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="1500" height="940" fill="#ffffff"/>
  <text x="750" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#20242e">Three generations of learned index</text>
  <text x="750" y="66" text-anchor="middle" font-size="14.5" fill="#6b7280">Same core idea — learn the key→position function — but three architectures with very different guarantees.</text>

  <line x1="505" y1="92" x2="505" y2="548" stroke="#e2e5ea" stroke-width="1.4" stroke-dasharray="3 5"/>
  <line x1="990" y1="92" x2="990" y2="548" stroke="#e2e5ea" stroke-width="1.4" stroke-dasharray="3 5"/>

  <text x="270" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#6b5b95">RMI — Kraska 2018</text>
  <text x="745" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#2f4b86">FITing-Tree — 2019</text>
  <text x="1230" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#b06a14">PGM-index — 2020</text>

  <!-- ===== RMI ===== -->
  <rect x="205" y="146" width="130" height="34" rx="6" fill="#e7e3ef" stroke="#6b5b95" stroke-width="1.8"/>
  <text x="270" y="168" text-anchor="middle" font-size="12" fill="#4a3f6b">root model</text>
  <g fill="#efecf5" stroke="#6b5b95" stroke-width="1.3">
    <rect x="95" y="216" width="100" height="32" rx="6"/><rect x="220" y="216" width="100" height="32" rx="6"/><rect x="345" y="216" width="100" height="32" rx="6"/>
  </g>
  <g font-size="11.5" fill="#4a3f6b" text-anchor="middle"><text x="145" y="236">model</text><text x="270" y="236">model</text><text x="395" y="236">model</text></g>
  <g stroke="#b3a9c9" stroke-width="1.1" fill="none"><path d="M270,180 L145,216"/><path d="M270,180 L270,216"/><path d="M270,180 L395,216"/></g>
  <rect x="95" y="288" width="350" height="20" rx="3" fill="#eef0f3" stroke="#c8cdd6"/>
  <text x="270" y="302" text-anchor="middle" font-size="11" fill="#6b7280">sorted array</text>
  <g stroke="#b3a9c9" stroke-width="1.1" fill="none" stroke-dasharray="3 3"><path d="M145,248 L200,288"/><path d="M270,248 L270,288"/><path d="M395,248 L340,288"/></g>
  <text x="270" y="340" text-anchor="middle" font-size="11.5" fill="#3a3f4b">model picks next model; final position is</text>
  <text x="270" y="356" text-anchor="middle" font-size="11.5" fill="#3a3f4b"><tspan font-weight="700">approximate</tspan> → binary search ±err</text>
  <text x="270" y="378" text-anchor="middle" font-size="11" fill="#9a4b3c">err measured AFTER training (data-dependent)</text>
  <text x="270" y="394" text-anchor="middle" font-size="11" fill="#9a4b3c">→ no worst-case bound; needs tuning</text>
  <rect x="150" y="416" width="240" height="30" rx="6" fill="#fff" stroke="#9a4b3c" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="270" y="436" text-anchor="middle" font-size="11" fill="#9a4b3c">B-tree fallback when a model errs too much</text>
  <text x="270" y="470" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8b919d">hybrid: learned models + classic fallback</text>

  <!-- ===== FITing-Tree ===== -->
  <rect x="680" y="146" width="130" height="34" rx="6" fill="#e8edf8" stroke="#2f4b86" stroke-width="1.8"/>
  <text x="745" y="168" text-anchor="middle" font-size="12" fill="#2f4b86">B+-tree root</text>
  <g fill="#eef1f8" stroke="#2f4b86" stroke-width="1.3">
    <rect x="610" y="216" width="120" height="32" rx="6"/><rect x="760" y="216" width="120" height="32" rx="6"/>
  </g>
  <g font-size="11.5" fill="#2f4b86" text-anchor="middle"><text x="670" y="236">B+ leaf</text><text x="820" y="236">B+ leaf</text></g>
  <g stroke="#9fb0d4" stroke-width="1.1" fill="none"><path d="M745,180 L670,216"/><path d="M745,180 L820,216"/></g>
  <g fill="#fbedd4" stroke="#b06a14" stroke-width="1.1">
    <rect x="585" y="286" width="48" height="26" rx="4"/><rect x="641" y="286" width="48" height="26" rx="4"/><rect x="697" y="286" width="48" height="26" rx="4"/>
    <rect x="753" y="286" width="48" height="26" rx="4"/><rect x="809" y="286" width="48" height="26" rx="4"/><rect x="865" y="286" width="48" height="26" rx="4"/>
  </g>
  <text x="749" y="332" text-anchor="middle" font-size="11" fill="#b06a14">ε-segments (slope, key, ptr)</text>
  <rect x="585" y="350" width="328" height="20" rx="3" fill="#eef0f3" stroke="#c8cdd6"/>
  <text x="749" y="364" text-anchor="middle" font-size="11" fill="#6b7280">sorted array</text>
  <g stroke="#cdb98e" stroke-width="1" fill="none" stroke-dasharray="3 3"><path d="M670,248 L660,286"/><path d="M820,248 L820,286"/></g>
  <text x="745" y="398" text-anchor="middle" font-size="11.5" fill="#3a3f4b"><tspan font-weight="700">ε fixed at construction</tspan> → bounded lookup</text>
  <text x="745" y="416" text-anchor="middle" font-size="11.5" fill="#3a3f4b">learned ONLY at the leaves;</text>
  <text x="745" y="432" text-anchor="middle" font-size="11.5" fill="#3a3f4b">a classic B+-tree routes above them</text>
  <text x="745" y="470" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8b919d">hybrid: B+-tree + learned segments</text>

  <!-- ===== PGM ===== -->
  <rect x="1175" y="146" width="110" height="34" rx="6" fill="#fbedd4" stroke="#b06a14" stroke-width="1.8"/>
  <text x="1230" y="168" text-anchor="middle" font-size="12" fill="#b06a14">root segment</text>
  <g fill="#fdf4e6" stroke="#b06a14" stroke-width="1.3">
    <rect x="1110" y="216" width="80" height="30" rx="6"/><rect x="1200" y="216" width="80" height="30" rx="6"/><rect x="1290" y="216" width="80" height="30" rx="6"/>
  </g>
  <text x="1240" y="236" text-anchor="middle" font-size="11" fill="#b06a14">level-1 segments</text>
  <g fill="#fdf4e6" stroke="#b06a14" stroke-width="1.1">
    <rect x="1055" y="284" width="44" height="26" rx="4"/><rect x="1105" y="284" width="44" height="26" rx="4"/><rect x="1155" y="284" width="44" height="26" rx="4"/>
    <rect x="1205" y="284" width="44" height="26" rx="4"/><rect x="1255" y="284" width="44" height="26" rx="4"/><rect x="1305" y="284" width="44" height="26" rx="4"/><rect x="1355" y="284" width="44" height="26" rx="4"/>
  </g>
  <text x="1227" y="330" text-anchor="middle" font-size="11" fill="#b06a14">level-2 segments</text>
  <rect x="1055" y="350" width="344" height="20" rx="3" fill="#eef0f3" stroke="#c8cdd6"/>
  <text x="1227" y="364" text-anchor="middle" font-size="11" fill="#6b7280">sorted array</text>
  <g stroke="#cdb98e" stroke-width="1" fill="none"><path d="M1230,180 L1150,216"/><path d="M1230,180 L1240,216"/><path d="M1230,180 L1330,216"/></g>
  <text x="1230" y="398" text-anchor="middle" font-size="11.5" fill="#3a3f4b"><tspan font-weight="700">segments index segments</tspan> → fully learned</text>
  <text x="1230" y="416" text-anchor="middle" font-size="11.5" fill="#3a3f4b">optimal segment count (convex hull)</text>
  <text x="1230" y="432" text-anchor="middle" font-size="11.5" fill="#3a3f4b">provable worst-case bounds</text>
  <text x="1230" y="470" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8b919d">pure: no traditional structure anywhere</text>

  <!-- ===== comparison matrix ===== -->
  <rect x="1018" y="566" width="442" height="350" rx="8" fill="#fbedd4" opacity="0.35"/>
  <line x1="40" y1="566" x2="1460" y2="566" stroke="#e2e5ea" stroke-width="1.4"/>
  <text x="58" y="592" font-size="15" font-weight="700" fill="#20242e">Side by side</text>

  <g font-size="13">
    <text x="400" y="624" font-weight="700" fill="#6b5b95">RMI</text>
    <text x="720" y="624" font-weight="700" fill="#2f4b86">FITing-Tree</text>
    <text x="1040" y="624" font-weight="700" fill="#b06a14">PGM-index</text>
  </g>
  <line x1="58" y1="634" x2="1442" y2="634" stroke="#e2e5ea"/>

  <g font-size="12.5" fill="#3a3f4b">
    <text x="58" y="662" font-weight="700">Error guarantee</text>
    <text x="400" y="662" fill="#9a4b3c">none (empirical)</text><text x="720" y="662">ε bound (hard)</text><text x="1040" y="662" font-weight="700">ε bound (hard)</text>

    <text x="58" y="696" font-weight="700">ε is set…</text>
    <text x="400" y="696">after training</text><text x="720" y="696">at construction</text><text x="1040" y="696">at construction</text>

    <text x="58" y="730" font-weight="700">Updates</text>
    <text x="400" y="730" fill="#9a4b3c">✗ read-only</text><text x="720" y="730">✓ delta buffer</text><text x="1040" y="730">✓ LSM levels (§3)</text>

    <text x="58" y="764" font-weight="700">Segmentation / model</text>
    <text x="400" y="764">ML model DAG, tuned</text><text x="720" y="764">ShrinkingCone (near-opt)</text><text x="1040" y="764" font-weight="700">convex hull (OPTIMAL)</text>

    <text x="58" y="798" font-weight="700">Routing structure</text>
    <text x="400" y="798">models + B-tree fallback</text><text x="720" y="798">B+-tree</text><text x="1040" y="798" font-weight="700">recursive segments</text>

    <text x="58" y="832" font-weight="700">Fully learned?</text>
    <text x="400" y="832" fill="#9a4b3c">✗ (fallback)</text><text x="720" y="832" fill="#9a4b3c">✗ (B+-tree)</text><text x="1040" y="832" font-weight="700" fill="#2c6f50">✓ yes</text>

    <text x="58" y="866" font-weight="700">Worst-case bound</text>
    <text x="400" y="866" fill="#9a4b3c">none</text><text x="720" y="866">bounded lookup</text><text x="1040" y="866" font-weight="700" fill="#2c6f50">provably I/O-optimal</text>
  </g>
  <line x1="58" y1="884" x2="1442" y2="884" stroke="#e2e5ea"/>
  <text x="58" y="906" font-size="12" font-style="italic" fill="#8b919d">The arc: RMI proved learning beats B-trees but gave no guarantees; FITing-Tree added a hard ε and updates atop a B+-tree; PGM made the segmentation optimal and the whole structure learned, earning provable bounds.</text>
</svg>
