<text x="750" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#20242e">Reading the Dynamic PGM: every query visits every run</text>
<text x="750" y="65" text-anchor="middle" font-size="14" fill="#6b7280">A key can be in any run, so there is no single place to look. Newest run is checked first (so tombstones win).</text>
<text x="40" y="104" font-size="15" font-weight="700" fill="#2f6f8f">① Point query  lookup(k)  — search each run with its own PGM, take the newest answer</text>
