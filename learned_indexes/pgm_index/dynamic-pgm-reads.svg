<text x="620" y="600" font-size="11.5" fill="#7a4fa3">slice: h, m</text>
<text x="1040" y="600" font-size="11.5" fill="#7a4fa3">slice: k, l, n</text>
<path d="M300,608 C300,635 700,635 720,648 M620,608 C620,635 710,640 720,648 M1040,608 C1040,635 740,640 720,648" stroke="#c9b6e0" stroke-width="1.1" fill="none"/>
<rect x="430" y="650" width="580" height="38" rx="8" fill="#efe9f5" stroke="#7a4fa3" stroke-width="1.6"/>
<text x="720" y="674" text-anchor="middle" font-size="12.5" font-family="ui-monospace,monospace" fill="#4a2f6b">heap-merge (size b) → h, j, k, l, m, n, p   (sorted, tombstones removed)</text>
<text x="60" y="724" font-size="12.5" fill="#3a3f4b">Each run returns the slice of its sorted array inside [lo,hi] (found via that run's PGM). A <tspan font-weight="700">heap of size b = #runs</tspan> merges the slices into one sorted</text>
<text x="60" y="744" font-size="12.5" fill="#3a3f4b">output, dropping any key shadowed by a tombstone. Cost = <tspan font-family="ui-monospace,monospace">O(log n(log m + log ε) + K log log n)</tspan> (or +K if the K results fit in a buffer).</text>
<rect x="40" y="772" width="1420" height="178" rx="10" fill="#fff6e8" stroke="#e7d4ad"/>
<text x="62" y="800" font-size="14" font-weight="700" fill="#b06a14">The whole picture in one breath</text>
<text x="62" y="826" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700">Writes</tspan> stay cheap by never editing a run: insert carries up and rebuilds a run by merging; delete drops a tombstone; GC happens when runs merge. (figure 1)</text>
<text x="62" y="846" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700">Reads</tspan> pay for that by visiting <tspan font-weight="700">every run</tspan>: a point query searches all O(log n) runs newest-first; a range query slices each run and heap-merges. (this figure)</text>
<text x="62" y="866" font-size="12.5" fill="#3a3f4b">Each run is a full static PGM, so "search a run" = the §2 recursive lookup (eval line → 2ε binary search, level by level) you already know.</text>
<line x1="62" y1="884" x2="1438" y2="884" stroke="#ecdcbb"/>
<text x="62" y="908" font-size="12.5" fill="#3a3f4b">So the dynamic PGM = <tspan font-weight="700">many §2 indexes + a binary-counter merge policy for writes + a search-all-runs policy for reads.</tspan></text>
<text x="62" y="930" font-size="12" font-style="italic" fill="#8b919d">The extra log n factor on reads (because data is spread across runs) is precisely the cost ALEX removes by absorbing inserts in place instead.</text>
</svg>