<text x="80" y="331" font-size="12.5" fill="#3a3f4b">Newest run wins: the tombstone ⌫k in S0 is seen before the real k in S3 → <tspan font-weight="700" fill="#cf4436">k reads as deleted.</tspan>  Cost = <tspan font-family="ui-monospace,monospace">O(log n) runs × (log m + log ε)</tspan>.</text>
