<text x="798" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">0</text>
<rect x="844" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="882" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">5</text>
<rect x="928" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="966" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">12</text>
<rect x="1012" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="1050" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">19</text>
<rect x="1096" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="1134" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">28</text>
<rect x="1180" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="1218" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">35</text>
<rect x="1264" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="1302" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">47</text>
<rect x="1348" y="604" width="76" height="30" rx="5" fill="#eef0f3" stroke="#c8cdd6"/>
<text x="1386" y="624" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">54</text>
<text x="760" y="660" font-size="12.5" fill="#3a3f4b">store the small gaps instead → a succinct structure packs them tightly with O(1) access:</text>
<text x="798" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+0</text>
<text x="882" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+5</text>
<text x="966" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+7</text>
<text x="1050" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+7</text>
<text x="1134" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+9</text>
<text x="1218" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+7</text>
<text x="1302" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+12</text>
<text x="1386" y="680" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14">+7</text>
<rect x="760" y="696" width="640" height="88" rx="8" fill="#f7f8fa" stroke="#e2e5ea"/>
<text x="778" y="722" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700">Prop 1:</tspan> intercepts fit in <tspan font-family="ui-monospace,monospace">m·log(n/m) + 1.92m + o(m)</tspan> bits,</text>
<text x="778" y="744" font-size="12.5" fill="#3a3f4b">with O(1) random access.  (Truncating to an integer costs +1 on ε.)</text>
<text x="778" y="768" font-size="11.5" font-style="italic" fill="#8b919d">Keys themselves are an orthogonal problem — handled by existing integer compressors.</text>
<rect x="40" y="810" width="1420" height="126" rx="10" fill="#fff6e8" stroke="#e7d4ad"/>
<text x="62" y="838" font-size="14" font-weight="700" fill="#b06a14">The trick: recycle slack the optimal algorithm already produced</text>
<text x="62" y="864" font-size="12.5" fill="#3a3f4b"><tspan font-weight="700">Slopes</tspan> were never single values — §2's convex hull handed each segment an INTERVAL of valid slopes. Overlapping intervals share one slope (interval stabbing,</text>
<text x="62" y="884" font-size="12.5" fill="#3a3f4b">the same greedy "extend the feasible region until it breaks" pattern as segmentation). <tspan font-weight="700">Intercepts</tspan> were already monotone integers &lt; n, so a succinct structure suffices.</text>
<text x="62" y="908" font-size="12.5" fill="#3a3f4b">Both halves are lossless and keep the ε-guarantee: the index is functionally identical, just smaller. The cleverness is <tspan font-weight="700">noticing the slack</tspan>, not adding machinery.</text>
<text x="62" y="928" font-size="12" font-style="italic" fill="#8b919d">This is a space optimization (a variant), not a new capability — the query/update algorithms are unchanged.</text>
</svg>