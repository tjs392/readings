<text x="357" y="633" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="#20242e">14.5</text>
<text x="60" y="668" font-size="12.5" font-weight="700" fill="#3a3f4b">each of m=8 segments stores a ⌈log t⌉ = 2-bit pointer:</text>
