<text x="99" y="692" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="#3a3f4b">s0</text>
<text x="99" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#2f6f8f" font-weight="700">→ 0</text>
<rect x="146" y="678" width="78" height="32" rx="5" fill="#f5f6f9" stroke="#c8cdd6"/>
<text x="185" y="692" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="#3a3f4b">s1</text>
<text x="185" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#2f6f8f" font-weight="700">→ 0</text>
<rect x="232" y="678" width="78" height="32" rx="5" fill="#f5f6f9" stroke="#c8cdd6"/>
<text x="271" y="692" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="#3a3f4b">s2</text>
<text x="271" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#2f6f8f" font-weight="700">→ 0</text>
<rect x="318" y="678" width="78" height="32" rx="5" fill="#f5f6f9" stroke="#c8cdd6"/>
<text x="357" y="692" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="#3a3f4b">s3</text>
<text x="357" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14" font-weight="700">→ 1</text>
<rect x="404" y="678" width="78" height="32" rx="5" fill="#f5f6f9" stroke="#c8cdd6"/>
<text x="443" y="692" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="#3a3f4b">s4</text>
<text x="443" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#b06a14" font-weight="700">→ 1</text>
<rect x="490" y="678" width="78" height="32" rx="5" fill="#f5f6f9" stroke="#c8cdd6"/>
