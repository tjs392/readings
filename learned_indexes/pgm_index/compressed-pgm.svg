<text x="1380" y="426" font-size="11" fill="#6b7280">slope →</text>
<text x="40" y="452" font-size="12.5" fill="#3a3f4b">Result: <tspan font-weight="700">8 segments → 4 distinct slopes</tspan>. Each shaded band is a group's common intersection; the tick is the one slope that serves every segment in it.</text>
<line x1="40" y1="540" x2="1460" y2="540" stroke="#e2e5ea"/>
<text x="40" y="566" font-size="15" font-weight="700" fill="#20242e">② Encoding — a small table + tiny pointers</text>
<text x="60" y="594" font-size="12.5" font-weight="700" fill="#3a3f4b">slope table T (t=4 floats, 64 bits each)</text>
<rect x="60" y="604" width="78" height="34" rx="5" fill="#2f6f8f" opacity="0.18" stroke="#2f6f8f"/>
