<svg viewBox="0 0 1500 960" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<rect x="0" y="0" width="1500" height="960" fill="#ffffff"/>
<text x="750" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#20242e">Compressing the segments: many slopes collapse into a few</text>
<text x="750" y="65" text-anchor="middle" font-size="14" fill="#6b7280">Each segment accepts a whole INTERVAL of valid slopes (a §2 byproduct). Overlapping intervals can share one slope — so store t ≪ m distinct slopes.</text>
<text x="40" y="102" font-size="15" font-weight="700" fill="#20242e">① Slopes — greedy "interval stabbing" on the slope axis</text>
<text x="40" y="122" font-size="12.5" fill="#3a3f4b">Sort the feasible slope intervals by left endpoint, then sweep: keep shrinking the running intersection (l,r) until an interval starts past r → that closes a group.</text>
