<text x="615" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#2c7d52" font-weight="700">→ 3</text>
<rect x="662" y="678" width="78" height="32" rx="5" fill="#f5f6f9" stroke="#c8cdd6"/>
<text x="701" y="692" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="#3a3f4b">s7</text>
<text x="701" y="706" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#2c7d52" font-weight="700">→ 3</text>
<rect x="60" y="726" width="640" height="58" rx="8" fill="#f7f8fa" stroke="#e2e5ea"/>
<text x="78" y="750" font-size="12.5" fill="#3a3f4b">before: 8 floats × 64 = <tspan font-weight="700">512 bits</tspan>   ·   after: 4×64 + 8×2 = <tspan font-weight="700" fill="#2c7d52">272 bits</tspan></text>
<text x="78" y="772" font-size="11.5" fill="#8b919d">Theorem 3: minimum t ≤ m distinct slopes, ε preserved, O(m log m) time, 64t + m⌈log t⌉ bits. The win grows as t ≪ m.</text>
<text x="760" y="566" font-size="15" font-weight="700" fill="#20242e">③ Intercepts — already monotone, so nearly free</text>
<text x="760" y="594" font-size="12.5" fill="#3a3f4b">intercept = position of each segment's first key → <tspan font-weight="700">increasing</tspan>, integer, and &lt; n:</text>
